name: Combined CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    name: Run Java Maven Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Run TestNG tests
        run: mvn test

      - name: Upload Maven Surefire Reports
        if: always()   # upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: maven-surefire-reports
          path: target/surefire-reports

  frontend-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    needs: backend-tests   # run only after backend tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: PlayWright-MediQ

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: PlayWright-MediQ

      - name: Run Playwright tests
        run: npx playwright test --reporter=html
        working-directory: PlayWright-MediQ

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: PlayWright-MediQ/playwright-report
